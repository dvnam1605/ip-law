version: '3.8'

services:
  neo4j:
    image: neo4j:5.15.0
    container_name: neo4j_legal_rag
    ports:
      - "7474:7474"  # HTTP Browser
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/dvnam1605
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: postgres_legal_rag
    ports:
      - "1607:5432"
    environment:
      - POSTGRES_USER=dvnam
      - POSTGRES_PASSWORD=dvnam1605
      - POSTGRES_DB=legal_rag
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_legal_rag
    ports:
      - "1608:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@legalrag.com
      - PGADMIN_DEFAULT_PASSWORD=admin123
      - PGADMIN_CONFIG_SERVER_MODE=False
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
